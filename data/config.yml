# NanaBot 配置文件
# 说明：群白名单与用户白名单已迁移到 SQLite，这里默认保留空列表仅用于兼容旧结构。
group_whitelist: [ ]
user_whitelist: [ ]

# 限流配置
rate_limit:
  # 是否启用限流
  enabled: true
  # 用户维度限流窗口（秒）
  user_window_seconds: 10
  # 用户维度窗口内最大请求次数
  user_max_requests: 5
  # 群维度限流窗口（秒）
  group_window_seconds: 10
  # 群维度窗口内最大请求次数
  group_max_requests: 15
  # 私聊维度限流窗口（秒）
  private_window_seconds: 10
  # 私聊维度窗口内最大请求次数
  private_max_requests: 5
  # 触发限流后的封禁秒数
  block_seconds: 30

# DeepSeek 聊天配置
deepseek_chat:
  # 系统提示词模板，支持使用 {bot_name} 占位符注入机器人昵称
  system_prompt: 你是一个QQ用户，名字叫{bot_name}。回答要像真人聊天，简短、直接、自然。默认用1到3句短句回答，除非用户明确要求详细。不要使用Markdown标题、列表或长段落。
  # 单次回复允许的最大 token 数
  max_tokens: 960
  # 每个会话最多保留的上下文消息条数
  max_context_messages: 20
